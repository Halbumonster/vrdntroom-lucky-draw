<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2026 The Verdant Room — Lucky Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep:  #111a13;
    --green-mid:   #1e3323;
    --green-soft:  #3a5e42;
    --green-light: #6a9e78;
    --green-pale:  #aecbb6;
    --gold:        #c9a96e;
    --gold-light:  #e8c98a;
    --cream:       #f4efe6;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%;
    font-family:'Noto Serif KR',serif;
    overflow:hidden; touch-action:none;
    background:#0d160f;
  }

  /* ── BACKGROUND ── */
  #bg {
    position:fixed; inset:0; z-index:0;
    background: url('https://i.imgur.com/ubltAoc.jpeg') center center / cover no-repeat;
  }
  #bg::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(
      to right,
      rgba(8,14,10,0.72) 0%,
      rgba(8,14,10,0.55) 30%,
      rgba(8,14,10,0.1)  60%,
      rgba(8,14,10,0.0)  100%
    );
  }

  /* ── IDLE ── */
  #idle {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:flex-start; justify-content:center;
    padding-left:7%;
    gap:36px;
    transition:opacity 0.5s ease;
  }
  #idle.hidden { opacity:0; pointer-events:none; }

  /* branding block */
  .brand-block {
    display:flex; flex-direction:column; gap:10px;
  }
  .brand-img-top {
    height:28px;
    width:auto;
    object-fit:contain;
    object-position:left center;
  }
  .brand-img-mid {
    width:auto;
    max-width:100%;
    height:auto;
    object-fit:contain;
    object-position:left center;
    margin-top:10px;
  }
  .brand-img-bot {
    height:52px;
    width:auto;
    object-fit:contain;
    object-position:left center;
  }
  .brand-img-mid, .brand-img-bot { max-width:260px; }
  .brand-img-mid { height:auto; }
  #fixedLogo {
    position:fixed;
    top:10vh;
    left:7%;
    z-index:100;
    pointer-events:none;
  }
  #fixedLogo img {
    height:22px;
    width:auto;
    opacity:0.88;
  }

  /* count selector */
  .count-selector { display:flex; gap:10px; }
  .count-btn {
    width:58px; height:58px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.13);
    cursor:pointer; transition:all 0.18s;
    backdrop-filter:blur(8px);
  }
  .count-btn:hover {
    background:rgba(106,158,120,0.15);
    border-color:rgba(106,158,120,0.35);
  }
  .count-btn.active {
    background:rgba(80,140,95,0.55);
    border-color:rgba(130,200,150,0.85);
    box-shadow: 0 0 14px rgba(106,158,120,0.35), inset 0 0 10px rgba(106,158,120,0.15);
  }
  .count-btn.active .count-num  { color:#e8f5ec; font-weight:400; }
  .count-btn.active .count-label { color:rgba(200,235,210,0.85); }
  .count-btn:active { transform:scale(0.93); }
  .count-num { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; color:rgba(244,239,230,0.7); transition: color 0.18s; }
  .count-label { font-family:'Cormorant Garamond',serif; font-size:9px; letter-spacing:0.2em; color:rgba(174,203,182,0.45); text-transform:uppercase; transition: color 0.18s; }

  /* touch ring button */
  .touch-btn {
    position:relative; width:140px; height:140px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px;
    cursor:pointer;
    transition: transform 0.25s ease;
  }
  .touch-btn::before {
    content:''; position:absolute; inset:0; border-radius:50%;
    background: radial-gradient(circle, rgba(106,158,120,0) 0%, rgba(106,158,120,0) 100%);
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  .touch-btn:hover::before {
    background: radial-gradient(circle, rgba(106,158,120,0.22) 0%, rgba(106,158,120,0.06) 70%);
    box-shadow: 0 0 40px 12px rgba(106,158,120,0.18), 0 0 80px 24px rgba(106,158,120,0.08);
  }
  .touch-btn:hover { transform: scale(1.06); }
  .touch-btn:hover .touch-ring   { border-color:rgba(106,158,120,0.7) !important; animation-play-state:paused; }
  .touch-btn:hover .touch-icon   { color:rgba(174,203,182,0.95); text-shadow:0 0 16px rgba(106,158,120,0.8); }
  .touch-btn:hover .touch-label  { color:rgba(174,203,182,0.8); letter-spacing:0.55em; }
  .touch-ring {
    position:absolute; inset:0; border-radius:50%;
    border:1px solid rgba(255,255,255,0.2);
    animation:ringPulse 3s ease-in-out infinite;
    transition: border-color 0.25s ease;
  }
  .touch-ring:nth-child(2) { inset:16px; border-color:rgba(255,255,255,0.13); animation-delay:0.5s; }
  .touch-ring:nth-child(3) { inset:32px; border-color:rgba(255,255,255,0.08); animation-delay:1s; }
  @keyframes ringPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.04);opacity:0.55;} }
  .touch-icon { font-size:24px; color:rgba(255,255,255,0.45); position:relative; z-index:1; animation:iconFloat 3s ease-in-out infinite; transition: color 0.25s ease, text-shadow 0.25s ease; }
  @keyframes iconFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
  .touch-label { font-family:'Cormorant Garamond',serif; font-size:10px; font-weight:300; letter-spacing:0.45em; color:rgba(255,255,255,0.38); text-transform:uppercase; position:relative; z-index:1; transition: color 0.25s ease, letter-spacing 0.25s ease; }


  /* ── RESULT SCREEN (all draws — same style) ── */
  #resultScreen {
    position:fixed; inset:0; z-index:30;
    display:flex; align-items:center; justify-content:flex-start;
    padding-left:7%;
    background:rgba(8,14,10,0.82);
    opacity:0; pointer-events:none;
    transition:opacity 0.28s ease;
  }
  #resultScreen.show { opacity:1; pointer-events:all; }

  .result-inner {
    display:flex; flex-direction:column;
    align-items:flex-start; gap:18px;
  }

  #resCounter {
    font-family:'Cormorant Garamond',serif;
    font-size:32px; font-weight:300; letter-spacing:0.18em;
    color:rgba(174,203,182,0.45);
    min-height:40px;
    transition: opacity 0.35s ease;
  }
  #resCounter.entering {
    opacity:0 !important;
  }

  #resName {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(44px, 6.5vw, 76px);
    font-weight:300; font-style:italic;
    color:#f4efe6; line-height:1.0;
    text-shadow:0 2px 50px rgba(130,200,150,0.2);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.2, 0, 0.3, 1);
  }
  #resName.entering {
    opacity:0 !important; transform:scale(0.88) !important;
  }

  .res-divider {
    width:56px; height:1px;
    background:linear-gradient(to right, var(--gold), transparent);
  }

  #resHint {
    font-family:'Cormorant Garamond',serif; font-size:10px;
    letter-spacing:0.42em; color:rgba(255,255,255,0.25);
    text-transform:uppercase; margin-top:4px;
  }

  /* ── SUMMARY ── */
  #summary {
    position:fixed; inset:0; z-index:35;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(6,12,8,0.96);
    backdrop-filter:blur(16px);
    opacity:0; pointer-events:none;
    transition:opacity 0.45s ease;
    padding:40px 24px;
  }
  #summary.show { opacity:1; pointer-events:all; }
  .summary-inner { width:100%; max-width:440px; display:flex; flex-direction:column; align-items:center; gap:18px; }
  .summary-title { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.45em; color:var(--gold); text-transform:uppercase; }
  .summary-list { width:100%; display:flex; flex-direction:column; gap:6px; }
  .summary-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px;
    background:rgba(25,42,28,0.5);
    border:1px solid rgba(106,158,120,0.12);
    opacity:0; transform:translateY(6px);
    transition:opacity 0.32s ease, transform 0.32s ease;
  }
  .summary-item.in { opacity:1; transform:translateY(0); }
  .summary-idx { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; color:rgba(106,158,120,0.7); min-width:32px; }
  .summary-prize { font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:300; font-style:italic; color:var(--cream); flex:1; }
  .summary-close {
    margin-top:6px; padding:13px 44px;
    background:transparent; border:1px solid rgba(106,158,120,0.25);
    color:rgba(174,203,182,0.6); font-family:'Cormorant Garamond',serif;
    font-size:11px; letter-spacing:0.35em; text-transform:uppercase; cursor:pointer;
    transition: all 0.22s ease;
  }
  .summary-close:hover {
    background:rgba(80,140,95,0.45);
    border-color:rgba(130,200,150,0.8);
    color:rgba(220,245,225,0.95);
    box-shadow: 0 0 18px rgba(106,158,120,0.3);
    letter-spacing:0.45em;
  }

  /* ── ADMIN ── */
  

  /* ── PARTICLES ── */
  .particle { position:fixed; border-radius:50%; pointer-events:none; z-index:20; animation:particleBurst linear forwards; }
  @keyframes particleBurst {
    0%   { opacity:0;    transform:translate(0,0) scale(0.3); }
    25%  { opacity:1;    transform:translate(calc(var(--px)*0.25),calc(var(--py)*0.25)) scale(1.1); }
    70%  { opacity:0.85; transform:translate(calc(var(--px)*0.7),calc(var(--py)*0.7)) scale(0.9); }
    100% { opacity:0;    transform:translate(var(--px),var(--py)) scale(0); }
  }
.admin-overlay {
    position:fixed; inset:0; background:rgba(5,10,6,0.97); z-index:200;
    display:none; flex-direction:column; align-items:center;
    overflow-y:auto; padding:48px 24px 40px; backdrop-filter:blur(16px);
  }
  .admin-overlay.show { display:flex; }
  .admin-panel { width:100%; max-width:500px; display:flex; flex-direction:column; gap:9px; }
  .admin-header { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.4em; color:var(--gold); text-transform:uppercase; text-align:center; margin-bottom:10px; }

  /* ── ADMIN OVERLAY ── */
  .admin-overlay {
    position:fixed; inset:0; background:rgba(5,10,6,0.97); z-index:200;
    display:none; flex-direction:column; align-items:center;
    overflow-y:auto; padding:48px 24px 40px; backdrop-filter:blur(16px);
  }
  .admin-overlay.show { display:flex; }
  .admin-panel { width:100%; max-width:500px; display:flex; flex-direction:column; gap:9px; }
  .admin-header { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.4em; color:var(--gold); text-transform:uppercase; text-align:center; margin-bottom:10px; }

  /* tabs */
  .admin-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:1px solid rgba(106,158,120,0.2); }
  .admin-tab { font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.3em; text-transform:uppercase; color:rgba(174,203,182,0.65); padding:10px 20px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.18s; }
  .admin-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
  .admin-tab-panel { display:none; }
  .admin-tab-panel.active { display:flex; flex-direction:column; gap:9px; }

  /* stock bar in admin */
  .admin-section { font-family:'Cormorant Garamond',serif; font-size:9px; letter-spacing:0.4em; color:rgba(174,203,182,0.75); text-transform:uppercase; padding-top:10px; border-top:1px solid rgba(106,158,120,0.15); margin-top:4px; }
  .stock-row { display:flex; align-items:center; gap:10px; padding:7px 11px; background:rgba(20,35,22,0.6); border:1px solid rgba(106,158,120,0.1); }
  .stock-rank { font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:0.2em; color:rgba(174,203,182,0.9); min-width:36px; }
  .stock-name { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:300; color:rgba(240,248,242,0.9); flex:1; }
  .stock-bar-fill-wrap { width:68px; height:2px; background:rgba(106,158,120,0.1); position:relative; overflow:hidden; flex-shrink:0; }
  .stock-bar-fill-wrap .stock-bar-inner { position:absolute; left:0; top:0; bottom:0; background:linear-gradient(to right,var(--green-soft),var(--green-light)); }
  .stock-count { font-family:'Cormorant Garamond',serif; font-size:18px; color:#f4efe6; min-width:32px; text-align:right; }
  .stock-count.empty { color:rgba(106,158,120,0.25); text-decoration:line-through; }

  /* history */
  .history-group-header { font-family:'Cormorant Garamond',serif; font-size:10px; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); opacity:0.7; padding:12px 0 6px; border-top:1px solid rgba(106,158,120,0.15); margin-top:4px; }
  .history-group-header:first-child { border-top:none; padding-top:0; margin-top:0; }
  .history-row { display:flex; align-items:center; gap:10px; padding:7px 11px; background:rgba(20,35,22,0.6); border:1px solid rgba(106,158,120,0.1); }
  .history-num { font-family:'Cormorant Garamond',serif; font-size:12px; color:rgba(174,203,182,0.8); min-width:28px; }
  .history-prize { font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--cream); flex:1; }
  .history-empty { font-family:'Cormorant Garamond',serif; font-size:12px; font-style:italic; color:rgba(106,158,120,0.3); text-align:center; padding:20px; }
  #historyLog { max-height:52vh; overflow-y:auto; display:flex; flex-direction:column; gap:6px; -webkit-overflow-scrolling:touch; }
  #historyLog::-webkit-scrollbar { width:3px; }
  #historyLog::-webkit-scrollbar-thumb { background:rgba(106,158,120,0.3); border-radius:2px; }

  /* edit rows */
  .admin-row { display:flex; align-items:center; gap:9px; padding:7px 11px; background:rgba(20,35,22,0.6); border:1px solid rgba(106,158,120,0.1); }
  .admin-label { font-family:'Cormorant Garamond',serif; font-size:9px; letter-spacing:0.2em; color:rgba(174,203,182,0.9); min-width:30px; }
  .admin-input { flex:1; background:rgba(10,18,12,0.7); border:1px solid rgba(106,158,120,0.2); color:var(--cream); font-family:'Noto Serif KR',serif; font-size:12px; padding:5px 8px; outline:none; min-width:0; }
  .admin-stock-input { width:52px; background:rgba(10,18,12,0.7); border:1px solid rgba(106,158,120,0.2); color:var(--cream); font-family:'Cormorant Garamond',serif; font-size:13px; padding:5px 7px; outline:none; text-align:center; flex-shrink:0; }

  /* buttons */
  .admin-save { padding:13px; background:linear-gradient(135deg,var(--green-mid),var(--green-soft)); border:none; color:var(--cream); font-family:'Cormorant Garamond',serif; font-size:12px; letter-spacing:0.3em; text-transform:uppercase; cursor:pointer; margin-top:6px; }
  .admin-reset { padding:9px; background:transparent; border:1px solid rgba(201,169,110,0.3); color:rgba(201,169,110,0.6); font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; transition:all 0.18s; }
  .admin-reset:hover { background:rgba(201,169,110,0.12); border-color:rgba(201,169,110,0.6); color:rgba(201,169,110,0.9); }
  .admin-clear { padding:9px; background:transparent; border:1px solid rgba(180,80,80,0.25); color:rgba(200,100,100,0.5); font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; transition:all 0.18s; }
  .admin-clear:hover { background:rgba(180,80,80,0.15); border-color:rgba(200,100,100,0.5); color:rgba(220,120,120,0.8); }
  .admin-close { padding:9px; background:transparent; border:1px solid rgba(106,158,120,0.35); color:rgba(174,203,182,0.75); font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; }

  .admin-btn {
    position:fixed; bottom:20px; right:20px;
    width:28px; height:28px;
    background:rgba(15,25,17,0.6); border:1px solid rgba(106,158,120,0.13);
    border-radius:50%; color:rgba(106,158,120,0.4); font-size:12px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:80;
  }

</style>
</head>
<body>

<div id="bg"></div>

<!-- FIXED TOP LOGO -->
<div id="fixedLogo">
  <img src="https://i.imgur.com/Q4ONtCX.png" alt="VRDNTROOM">
</div>

<!-- IDLE -->
<div id="idle">
  <div class="brand-block">
    <img class="brand-img-mid" src="https://i.imgur.com/CJFm2Y9.png" alt="">
    <img class="brand-img-bot" src="https://i.imgur.com/91sjRdA.png" alt="">
  </div>

  <div class="count-selector">
    <div class="count-btn active" data-count="1" onclick="selectCount(1)"><span class="count-num">1</span><span class="count-label">회</span></div>
    <div class="count-btn" data-count="3" onclick="selectCount(3)"><span class="count-num">3</span><span class="count-label">회</span></div>
    <div class="count-btn" data-count="5" onclick="selectCount(5)"><span class="count-num">5</span><span class="count-label">회</span></div>
    <div class="count-btn" data-count="10" onclick="selectCount(10)"><span class="count-num">10</span><span class="count-label">회</span></div>
  </div>

  <div class="touch-btn" onclick="beginDraw()">
    <div class="touch-ring"></div>
    <div class="touch-ring"></div>
    <div class="touch-ring"></div>
    <div class="touch-icon">🍀</div>
  </div>

</div>

<!-- ADMIN -->

<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">

      <div class="admin-tab active" onclick="switchAdminTab('stock')">재고</div>

      <button class="admin-close" onclick="closeAdmin()">CLOSE</button>

    <div class="admin-tab-panel" id="tab-history">
      <div class="admin-section" style="border:none;padding:0;margin:0">Draw History</div>
      <div id="historyLog"></div>
      <button class="admin-clear" onclick="clearHistory()">기록 초기화</button>
      <button class="admin-close" onclick="closeAdmin()">CLOSE</button>
    </div>
    <div class="admin-tab-panel" id="tab-edit">
      <div class="admin-section" style="border:none;padding:0;margin:0">Edit Stock</div>
      <div id="adminRows"></div>

      <button class="admin-reset" onclick="resetStock()">RESET TO DEFAULT</button>
      <button class="admin-close" onclick="closeAdmin()">CANCEL</button>
    </div>
  </div>
</div>

<!-- RESULT SCREEN (all draws, unified) -->
<div id="resultScreen" onclick="onResultTap()">

  </div>
</div>

<!-- SUMMARY -->

  <div class="summary-inner">
    <div class="summary-list" id="summaryList"></div>
    <button class="summary-close" onclick="closeSummary()">Home</button>
  </div>
</div>

      <div class="admin-section" style="border:none;padding:0;margin:0">Edit Stock</div>
      <div id="adminRows"></div>
      <button class="admin-save" onclick="saveAdmin()">SAVE &amp; CLOSE</button>
      <button class="admin-reset" onclick="resetStock()">RESET TO DEFAULT</button>
      <button class="admin-close" onclick="closeAdmin()">CANCEL</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════
// PRIZES CONFIG
// ════════════════════════════
let PRIZES = [
  { rank:1, rankLabel:'1st', weight:2,   particles:true,  variants:[{ name:'전시 액자',           stock:3   }] },
  { rank:2, rankLabel:'2nd', weight:4,   particles:true,  variants:[{ name:'티셔츠',               stock:5   }] },
  { rank:3, rankLabel:'3rd', weight:8,   particles:false, variants:[{ name:'타올슬로건',           stock:10  }] },
  { rank:3, rankLabel:'3rd', weight:10,  particles:false, variants:[{ name:'미니우치와',           stock:12  }] },
  { rank:4, rankLabel:'4th', weight:10,  particles:false, variants:[{ name:'리유저블컵',           stock:12  }] },
  { rank:5, rankLabel:'5th', weight:82,  particles:false, variants:[{ name:'말랑핀버튼 쁘이대영',  stock:25  }, { name:'말랑핀버튼 뿌우대영', stock:25 }, { name:'말랑핀버튼 노래대영', stock:25 }, { name:'말랑핀버튼 꺄악대영', stock:25 }] },
  { rank:6, rankLabel:'6th', weight:123, particles:false, variants:[{ name:'안경닦이 보라',        stock:50  }, { name:'안경닦이 민트', stock:50 }, { name:'안경닦이 파랑', stock:50 }] },
  { rank:7, rankLabel:'7th', weight:240, particles:false, variants:[{ name:'포토카드',             stock:240 }] },
];
PRIZES.forEach(p => { p.maxStock = p.variants.reduce((s,v) => s+v.stock, 0); });

// ════════════════════════════
// PARTICLES
// ════════════════════════════
const GREEN_P = ['#7bc47a','#a8d8a8','#5aa86a','#c8e6c9','#4caf50','#b9f6ca','#81c784'];
const GOLD_P  = ['#c9a96e','#e8c98a','#f5e6c0','#d4a853','#ffd54f','#ffe082'];

function spawnParticles(rank) {
  const colors = rank <= 2 ? GOLD_P : GREEN_P;
  const count  = rank <= 2 ? 90 : 65;
  const cx = window.innerWidth  * 0.22;
  const cy = window.innerHeight * 0.48;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p  = document.createElement('div');
      p.className = 'particle';
      const sz = Math.random() * 16 + 5;
      const a  = Math.random() * Math.PI * 2;
      const d  = Math.random() * 420 + 100;
      const dur = (Math.random() * 0.8 + 0.7).toFixed(2);
      p.style.cssText = `left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};--px:${(Math.cos(a)*d).toFixed(1)}px;--py:${(Math.sin(a)*d - Math.random()*120).toFixed(1)}px;animation-duration:${dur}s;animation-delay:${(Math.random()*0.2).toFixed(2)}s`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (parseFloat(dur)+0.3)*1000);
    }, i * 12);
  }
}

// ════════════════════════════
// STATE
// ════════════════════════════
let selectedCount = 1;
const SUPABASE_URL = 'https://hiiodtlnvtytnvxflqsn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaW9kdGxudnR5dG52eGZscXNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MDI3NzQsImV4cCI6MjA5NjQ3ODc3NH0.A8gAXo8UrKdgdiOmkP2q0O9EOPmSWNJqNcfAYIDzWsc';
let drawLog = [];
let counterDbId = null; // 참여자수 카운터 DB id // { prize, variantName, time, drawNum }
let drawTotal = 0; // 누적 뽑기 횟수
let drawing  = false;
let drawQueue = [];
let drawIndex = 0;

// ════════════════════════════
// SUPABASE
// ════════════════════════════
async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.status === 204 ? null : res.json();
}

// DB에서 재고 불러와서 PRIZES에 반영
async function loadStockFromDB() {
  try {
    const rows = await sbFetch('/rest/v1/stock?select=*&order=id');
    rows.forEach(row => {
      if (row.rank === 'counter') {
        counterDbId = row.id;
        updateCounterDisplay(row.stock);
        return;
      }
      PRIZES.forEach(p => {
        p.variants.forEach(v => {
          if (v.name === row.name) {
            v.stock    = row.stock;
            v.maxStock = row.max_stock;
            v.db_id    = row.id;
          }
        });
      });
    });
    // maxStock 재계산
    PRIZES.forEach(p => {
      p.maxStock = p.variants.reduce((s, v) => s + (v.stock || 0), 0);
    });
    console.log('재고 로딩 완료');
    await loadDrawLogFromDB();
  } catch (e) {
    console.warn('재고 로딩 실패 (오프라인?)', e);
  }
}

async function loadDrawLogFromDB() {
  try {
    const rows = await sbFetch('/rest/v1/draw_log?select=*&order=id');
    // groupTotal 복원
    if (rows.length > 0) {
      groupTotal = Math.max(...rows.map(r => r.group_id));
      drawTotal  = rows.length;
    }
    // drawLog 복원
    drawLog = rows.map(r => ({
      variantName:    r.variant_name,
      rank:           r.rank,
      time:           new Date(r.drawn_at).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'}),
      drawNum:        r.id,
      groupId:        r.group_id,
      groupCount:     r.group_count,
      indexInGroup:   r.index_in_group,
    }));
    console.log('뽑기 기록 로딩 완료:', drawLog.length, '건');
  } catch(e) {
    console.warn('뽑기 기록 로딩 실패:', e);
  }
}

function updateCounterDisplay(n) {
  const el = document.getElementById('participantCount');
  if (el) el.textContent = n;
}

// DB 재고 원자적 차감 (RPC — 동시 요청 충돌 방지)
async function syncStockToDB(variant) {
  if (!variant.db_id) return;
  try {
    const result = await sbFetch('/rest/v1/rpc/decrement_stock', {
      method: 'POST',
      body: JSON.stringify({ row_id: variant.db_id })
    });
    // DB에서 반환된 실제 stock 값으로 로컬 동기화
    if (typeof result === 'number') variant.stock = result;
  } catch (e) {
    console.warn('DB 동기화 실패:', e);
  }
}

function selectCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.count) === n)
  );
}

function getTotalStock(p) { return p.variants.reduce((s,v) => s+v.stock, 0); }

function pickPrize() {
  const avail = PRIZES.filter(p => getTotalStock(p) > 0);
  if (!avail.length) return null;
  const total = avail.reduce((s,p) => s+p.weight, 0);
  let r = Math.random() * total;
  for (const p of avail) { r -= p.weight; if (r <= 0) return p; }
  return avail[avail.length-1];
}

function pickVariant(prize) {
  const avail = prize.variants.filter(v => v.stock > 0);
  if (!avail.length) return prize.variants[0];
  return avail[Math.floor(Math.random() * avail.length)];
}

let groupTotal = 0; // 회차 그룹 카운터

function buildQueue(count) {
  const results = [];
  const now = new Date();
  groupTotal++;
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' +
                  now.getMinutes().toString().padStart(2,'0') + ':' +
                  now.getSeconds().toString().padStart(2,'0');

  // 뽑기 먼저 전부 진행 (로컬 차감)
  for (let i = 0; i < count; i++) {
    const prize = pickPrize();
    if (!prize) break;
    const variant = pickVariant(prize);
    variant.stock = Math.max(0, variant.stock - 1);
    drawTotal++;
    drawLog.push({
      variantName: variant.name,
      rank: prize.rank,
      time: timeStr,
      drawNum: drawTotal,
      groupId: groupTotal,
      groupCount: count,
      indexInGroup: i + 1,
    });
    results.push({ prize, variantName: variant.name });
  }

  // 각 뽑기 결과를 DB에 원자적으로 차감
  results.forEach(({ prize, variantName }) => {
    prize.variants.forEach(v => {
      if (v.name === variantName && v.db_id !== undefined) {
        syncStockToDB(v);
      }
    });
  });

  renderStockBar();
  saveDrawLogToDB(results, timeStr);
  return results;
}

async function saveDrawLogToDB(results, timeStr) {
  try {
    const rows = results.map((r, i) => ({
      group_id:       groupTotal,
      group_count:    results.length,
      index_in_group: i + 1,
      variant_name:   r.variantName,
      rank:           r.prize.rankLabel,
    }));
    await sbFetch('/rest/v1/draw_log', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify(rows)
    });
  } catch(e) {
    console.warn('뽑기 기록 저장 실패:', e);
  }
}

// ════════════════════════════
// DRAW FLOW
// ════════════════════════════
function beginDraw() {
  if (drawing) return;
  if (PRIZES.every(p => getTotalStock(p) === 0)) { alert('모든 굿즈가 소진되었습니다 🌿'); return; }
  drawing   = true;
  drawQueue = buildQueue(selectedCount);
  if (!drawQueue.length) { drawing = false; return; }
  drawIndex = 0;
  incrementCounter();
  document.getElementById('idle').classList.add('hidden');
  showResult(drawQueue[0]);
}

async function incrementCounter() {
  if (!counterDbId) return;
  try {
    const result = await sbFetch('/rest/v1/rpc/increment_counter', {
      method: 'POST',
      body: JSON.stringify({ row_id: counterDbId })
    });
    if (typeof result === 'number') updateCounterDisplay(result);
  } catch(e) {
    console.warn('카운터 업데이트 실패:', e);
  }
}

function showResultContent({ prize, variantName }) {
  const total = drawQueue.length;
  const idx   = drawIndex + 1;
  const counter = document.getElementById('resCounter');
  const name    = document.getElementById('resName');

  // snap to invisible/small
  counter.classList.add('entering');
  name.classList.add('entering');

  // update text while invisible
  counter.textContent = total > 1 ? `${idx} / ${total}` : '';
  name.textContent = variantName;
  document.getElementById('resHint').textContent =
    (total === 1 || idx === total) ? 'touch to finish' : 'touch to continue';

  // force reflow so browser registers the 'entering' state before removing it
  void counter.offsetHeight;
  void name.offsetHeight;
  setTimeout(() => {
    counter.classList.remove('entering');
    name.classList.remove('entering');
  }, 20);

  setTimeout(() => spawnParticles(prize.rank), 120);
}

function showResult({ prize, variantName }) {
  showResultContent({ prize, variantName });
  document.getElementById('resultScreen').classList.add('show');
}

function onResultTap() {
  if (drawIndex + 1 < drawQueue.length) {
    // fade out current text first
    const name    = document.getElementById('resName');
    const counter = document.getElementById('resCounter');
    name.classList.add('entering');
    counter.classList.add('entering');
    // after fade-out completes, swap content and fade back in
    setTimeout(() => {
      drawIndex++;
      showResultContent(drawQueue[drawIndex]);
    }, 320);
  } else {
    drawIndex++;
    document.getElementById('resultScreen').classList.remove('show');
    finishDraw();
  }
}

function finishDraw() {
  if (drawQueue.length === 1) {
    document.getElementById('idle').classList.remove('hidden');
    drawing = false;
    return;
  }
  // multi: show summary
  const list = document.getElementById('summaryList');
  list.innerHTML = '';
  drawQueue.forEach(({ variantName }, i) => {
    const item = document.createElement('div');
    item.className = 'summary-item';
    item.innerHTML = `<span class="summary-idx">${i+1}</span><span class="summary-prize">${variantName}</span>`;
    list.appendChild(item);
  });
  document.getElementById('summary').classList.add('show');
  setTimeout(() => {
    document.querySelectorAll('.summary-item').forEach((el,i) =>
      setTimeout(() => el.classList.add('in'), i * 65)
    );
  }, 80);
}

function closeSummary() {
  document.getElementById('summary').classList.remove('show');
  document.getElementById('idle').classList.remove('hidden');
  drawing = false;
}

// ════════════════════════════
// STOCK BAR
// ════════════════════════════
function renderStockBar() {
  const bar = document.getElementById('stockBar');
  if (!bar) return;
  bar.innerHTML = '';
  PRIZES.forEach(p => {
    p.variants.forEach(v => {
      const pct   = p.maxStock > 0 ? (v.stock / (p.maxStock / p.variants.length)) * 100 : 0;
      const empty = v.stock === 0;
      const row   = document.createElement('div');
      row.className = 'stock-row';
      row.innerHTML = `<span class="stock-rank">${p.rankLabel}</span><span class="stock-name">${v.name}</span><div class="stock-bar-fill-wrap"><div class="stock-bar-inner" style="width:${Math.min(100,pct)}%"></div></div><span class="stock-count${empty?' empty':''}">${v.stock}</span>`;
      bar.appendChild(row);
    });
  });
}

// ════════════════════════════
// ADMIN
// ════════════════════════════















function closeAdmin() { document.getElementById('adminOverlay').classList.remove('show'); }

// 초기 재고 로딩
loadStockFromDB();


function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach((t,i) => {
    t.classList.toggle('active', ['stock','history','edit'][i] === tab);
  });
  document.querySelectorAll('.admin-tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
  if (tab === 'stock') renderStockBar();
  if (tab === 'edit') openAdminEdit();
}

function renderHistory() {
  const log = document.getElementById('historyLog');
  if (!log) return;
  if (drawLog.length === 0) { log.innerHTML = '<div class="history-empty">아직 뽑기 기록이 없어요</div>'; return; }
  log.innerHTML = '';
  const groups = {};
  drawLog.forEach(e => { if (!groups[e.groupId]) groups[e.groupId] = []; groups[e.groupId].push(e); });
  Object.keys(groups).map(Number).sort((a,b)=>b-a).forEach(gid => {
    const entries = groups[gid];
    const header = document.createElement('div');
    header.className = 'history-group-header';
    header.textContent = `${entries[0].groupCount}회 뽑기  ·  ${entries[0].time}`;
    log.appendChild(header);
    entries.forEach(e => {
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `<span class="history-num">${e.indexInGroup}</span><span class="history-prize">${e.variantName}</span>`;
      log.appendChild(row);
    });
  });
}

async function clearHistory() {
  if (!confirm('기록을 초기화할까요?')) return;
  try {
    await sbFetch('/rest/v1/draw_log?id=gt.0', { method: 'DELETE' });
  } catch(e) {
    console.warn('DB 기록 삭제 실패:', e);
  }
  drawLog = []; drawTotal = 0; groupTotal = 0;
  renderHistory();
}

function openAdmin() {
  switchAdminTab('stock');
  document.getElementById('adminOverlay').classList.add('show');
}

function openAdminEdit() {
  const rows = document.getElementById('adminRows');
  rows.innerHTML = '';
  PRIZES.forEach((p,pi) => {
    p.variants.forEach((v,vi) => {
      const row = document.createElement('div');
      row.className = 'admin-row';
      row.innerHTML = `<span class="admin-label">${p.rankLabel}</span><input class="admin-input" id="adm-n-${pi}-${vi}" value="${v.name}"><input class="admin-stock-input" id="adm-s-${pi}-${vi}" type="number" min="0" value="${v.stock}">`;
      rows.appendChild(row);
    });
  });
}

async function saveAdmin() {
  PRIZES.forEach((p,pi) => {
    p.variants.forEach((v,vi) => {
      const n = document.getElementById(`adm-n-${pi}-${vi}`);
      const s = document.getElementById(`adm-s-${pi}-${vi}`);
      if (n) v.name = n.value || v.name;
      if (s) { const val = parseInt(s.value); if (!isNaN(val)) v.stock = val; }
    });
    p.maxStock = Math.max(p.maxStock, getTotalStock(p));
  });
  const updates = [];
  PRIZES.forEach(p => p.variants.forEach(v => { if (v.db_id !== undefined) updates.push(syncStockToDB(v)); }));
  await Promise.all(updates);
  renderStockBar();
  closeAdmin();
}

function closeAdmin() { document.getElementById('adminOverlay').classList.remove('show'); }

async function resetStock() {
  if (!confirm('모든 재고를 초기값으로 되돌릴까요?')) return;
  PRIZES.forEach(p => { p.variants.forEach(v => { v.stock = v.maxStock ?? v.stock; }); });
  const updates = [];
  PRIZES.forEach(p => p.variants.forEach(v => {
    if (v.db_id !== undefined) updates.push(sbFetch(`/rest/v1/stock?id=eq.${v.db_id}`, { method:'PATCH', body:JSON.stringify({ stock: v.stock }) }));
  }));
  await Promise.all(updates);
  renderStockBar();
  alert('초기화 완료!');
}

async function resetCounter() {
  if (!confirm('참여자 수를 0으로 초기화할까요?')) return;
  if (!counterDbId) return;
  await sbFetch(`/rest/v1/stock?id=eq.${counterDbId}`, { method:'PATCH', body:JSON.stringify({ stock: 0 }) });
  updateCounterDisplay(0);
  alert('초기화 완료!');
}

document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
</script>
</body>
</html>
